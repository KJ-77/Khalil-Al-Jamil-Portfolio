<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Khalil Al Jamil — NEON CITY / 2077</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root {
  --void:    oklch(0.11 0.025 295);
  --bg:      oklch(0.14 0.03  295);
  --bg-2:    oklch(0.17 0.035 295);
  --bg-3:    oklch(0.21 0.04  295);
  --fg:      oklch(0.95 0.015 290);
  --fg-dim:  oklch(0.72 0.04  290);
  --fg-mute: oklch(0.50 0.04  290);
  --line:    oklch(0.55 0.12  295 / 0.35);
  --line-s:  oklch(0.55 0.12  295 / 0.15);
  --violet:  oklch(0.74 0.24  295);
  --violet-d:oklch(0.74 0.24  295 / 0.18);
  --cyan:    oklch(0.84 0.17  210);
  --cyan-d:  oklch(0.84 0.17  210 / 0.15);
  --magenta: oklch(0.72 0.26  330);
  --ok:      oklch(0.78 0.16  155);
  --warn:    oklch(0.80 0.18   70);
  --mono:    "Space Mono", ui-monospace, monospace;
  --grotesk: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
  --jp:      "Noto Serif JP", serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--void);color:var(--fg);font-family:var(--grotesk);-webkit-font-smoothing:antialiased;}
body{overflow-x:hidden;}
a{color:inherit;text-decoration:none;}
::selection{background:var(--violet);color:var(--void);}

/* ── rain canvas ── */
#rain{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.25;}

/* ── overlays ── */
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:2;opacity:.05;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,oklch(0.55 0.12 295) 2px,oklch(0.55 0.12 295) 3px);}
.vignette{position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse 80% 70% at 50% 0%,oklch(0.74 0.24 295 / 0.10),transparent 65%),
             radial-gradient(ellipse 100% 50% at 50% 100%,oklch(0 0 0 / 0.5),transparent 70%);}

/* ── chrome: top bar ── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:44px;z-index:50;
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  background:oklch(0.11 0.025 295 / 0.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  font-family:var(--mono);font-size:10.5px;color:var(--fg-mute);letter-spacing:.1em;
}
.topbar .left{display:flex;gap:24px;align-items:center;}
.topbar .right{display:flex;gap:20px;align-items:center;}
.topbar .logo{
  font-family:var(--grotesk);font-weight:700;font-size:13px;letter-spacing:.05em;
  color:var(--violet);text-shadow:0 0 18px var(--violet);
}
.topbar .live{color:var(--ok);letter-spacing:.14em;}
.topbar .live::before{content:"●";margin-right:6px;animation:blink 2s steps(1) infinite;}
.topbar .nav-links{display:flex;gap:20px;}
.topbar .nav-links a{color:var(--fg-mute);transition:color .2s;}
.topbar .nav-links a:hover{color:var(--violet);text-shadow:0 0 12px var(--violet);}
.topbar .btn-contact{
  padding:6px 14px;border:1px solid var(--violet);color:var(--violet);
  font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  transition:all .2s;cursor:pointer;background:transparent;
}
.topbar .btn-contact:hover{background:var(--violet);color:var(--void);box-shadow:0 0 24px var(--violet);}
@keyframes blink{50%{opacity:0;}}

/* ── page ── */
.page{position:relative;z-index:10;padding-top:44px;}
section{padding:100px 48px;border-bottom:1px solid var(--line-s);position:relative;}
@media(max-width:800px){section{padding:72px 20px;}}

/* ── kanji watermark ── */
.kanji-bg{
  position:absolute;right:48px;top:50%;transform:translateY(-50%);
  font-family:var(--jp);font-size:clamp(120px,18vw,260px);font-weight:300;
  color:oklch(0.55 0.12 295 / 0.06);pointer-events:none;user-select:none;line-height:1;
  text-shadow:none;
}
@media(max-width:800px){.kanji-bg{font-size:100px;right:16px;}}

/* ── section head ── */
.sec-head{
  display:flex;align-items:center;gap:16px;margin-bottom:48px;
  font-family:var(--mono);font-size:10px;color:var(--fg-mute);letter-spacing:.22em;text-transform:uppercase;
}
.sec-head .sector{color:var(--violet);font-weight:700;text-shadow:0 0 10px var(--violet);}
.sec-head .rule{flex:1;height:1px;background:linear-gradient(to right,var(--line),transparent);}
.sec-head .jp{font-family:var(--jp);font-size:14px;color:oklch(0.55 0.12 295 / 0.5);font-weight:300;margin-left:8px;}

/* ── glow border panel ── */
.panel{
  border:1px solid var(--line);background:oklch(0.14 0.03 295 / 0.6);
  position:relative;backdrop-filter:blur(4px);
  transition:border-color .3s,box-shadow .3s;
}
.panel:hover{border-color:var(--violet);box-shadow:0 0 28px oklch(0.74 0.24 295 / 0.2),inset 0 0 28px oklch(0.74 0.24 295 / 0.04);}
.panel::before{content:"";position:absolute;top:-1px;left:-1px;width:12px;height:12px;border-top:1px solid var(--violet);border-left:1px solid var(--violet);}
.panel::after{content:"";position:absolute;bottom:-1px;right:-1px;width:12px;height:12px;border-bottom:1px solid var(--violet);border-right:1px solid var(--violet);}

/* ── HERO ── */
.hero{min-height:calc(100vh - 44px);display:grid;grid-template-rows:1fr auto;position:relative;overflow:hidden;}
.hero-inner{display:flex;flex-direction:column;justify-content:center;padding:80px 48px 40px;}
@media(max-width:800px){.hero-inner{padding:60px 20px 32px;}}

.hero-tag{font-family:var(--mono);font-size:11px;color:var(--cyan);letter-spacing:.28em;text-transform:uppercase;margin-bottom:24px;text-shadow:0 0 12px var(--cyan);}

.hero-name{
  font-family:var(--grotesk);font-weight:700;
  font-size:clamp(52px,10vw,160px);line-height:.92;letter-spacing:-.03em;
  margin:0;
}
.hero-name .line1{display:block;color:var(--fg);}
.hero-name .line2{display:block;color:transparent;-webkit-text-stroke:1px var(--violet);text-shadow:0 0 40px oklch(0.74 0.24 295 / 0.6);}
.hero-name .line3{display:block;color:var(--violet);text-shadow:0 0 60px var(--violet),0 0 120px oklch(0.74 0.24 295 / 0.4);}

/* katana divider */
.katana-wrap{
  margin:36px 0;display:flex;align-items:center;gap:24px;
  font-family:var(--mono);font-size:11px;color:var(--fg-mute);letter-spacing:.2em;
}
.katana{flex:1;position:relative;height:2px;}
.katana-blade{width:100%;height:1px;background:linear-gradient(to right,transparent,var(--violet),var(--cyan),transparent);position:absolute;top:50%;transform:translateY(-50%);}
.katana-tsuba{width:14px;height:20px;border:1px solid var(--violet);border-radius:50%;background:var(--void);box-shadow:0 0 10px var(--violet);flex-shrink:0;}
.katana-handle{width:72px;height:6px;background:repeating-linear-gradient(90deg,var(--fg-mute) 0,var(--fg-mute) 4px,transparent 4px,transparent 8px);opacity:.4;flex-shrink:0;}

.hero-sub{
  display:grid;grid-template-columns:auto 1fr;gap:0 48px;align-items:start;
  font-family:var(--mono);font-size:12.5px;line-height:1.7;
}
@media(max-width:900px){.hero-sub{grid-template-columns:1fr;gap:18px;}}
.hero-role{border-left:2px solid var(--violet);padding-left:16px;box-shadow:inset 4px 0 12px oklch(0.74 0.24 295 / 0.15);}
.hero-role .dim{color:var(--fg-mute);}
.hero-role .hl{color:var(--violet);text-shadow:0 0 10px var(--violet);}
.hero-role .cursor{display:inline-block;width:8px;height:14px;background:var(--violet);margin-left:4px;vertical-align:-2px;animation:blink 1.1s steps(1) infinite;box-shadow:0 0 8px var(--violet);}
.hero-dek{color:var(--fg-dim);font-family:var(--grotesk);font-size:16px;line-height:1.6;max-width:560px;}

/* hero bottom strip */
.hero-strip{
  display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
  border-top:1px solid var(--line);background:var(--line);
}
@media(max-width:800px){.hero-strip{grid-template-columns:1fr 1fr;}}
.strip-cell{
  background:oklch(0.11 0.025 295 / 0.85);padding:22px 28px;
  font-family:var(--mono);font-size:11px;color:var(--fg-mute);letter-spacing:.12em;
}
.strip-cell .val{
  font-family:var(--grotesk);font-size:clamp(32px,4vw,56px);font-weight:600;
  color:var(--fg);line-height:1;margin-top:6px;letter-spacing:-.02em;
}
.strip-cell .val .unit{font-size:.45em;color:var(--fg-mute);vertical-align:.2em;margin-left:2px;}
.strip-cell .sub{color:var(--cyan);font-size:10px;margin-top:6px;text-shadow:0 0 8px var(--cyan);}

/* ── IDENTITY ── */
.id-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:64px;align-items:start;}
@media(max-width:1000px){.id-grid{grid-template-columns:1fr;gap:36px;}}

.bio-text{font-family:var(--grotesk);font-size:17px;line-height:1.65;color:var(--fg-dim);}
.bio-text p{margin:0 0 18px;}
.bio-text em{color:var(--violet);font-style:normal;text-shadow:0 0 8px oklch(0.74 0.24 295 / 0.5);}
.bio-text .cyan{color:var(--cyan);text-shadow:0 0 8px oklch(0.84 0.17 210 / 0.5);}

.id-card-v3{
  border:1px solid var(--line);background:oklch(0.14 0.03 295 / 0.5);
  backdrop-filter:blur(8px);padding:28px;position:relative;
}
.id-card-v3::before,.id-card-v3::after{content:"";position:absolute;width:12px;height:12px;}
.id-card-v3::before{top:-1px;left:-1px;border-top:1px solid var(--cyan);border-left:1px solid var(--cyan);}
.id-card-v3::after{bottom:-1px;right:-1px;border-bottom:1px solid var(--cyan);border-right:1px solid var(--cyan);}
.id-card-v3 .card-head{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--fg-mute);display:flex;justify-content:space-between;margin-bottom:20px;}
.id-card-v3 .card-head .live{color:var(--ok);text-shadow:0 0 8px var(--ok);}
.id-card-v3 .avatar{
  width:100%;aspect-ratio:1;background:
    radial-gradient(circle at 40% 35%,oklch(0.30 0.06 295),oklch(0.14 0.03 295) 65%,transparent 75%);
  border:1px solid var(--line);margin-bottom:20px;position:relative;overflow:hidden;
}
.id-card-v3 .avatar::after{
  content:"侍";font-family:var(--jp);font-size:88px;font-weight:300;
  position:absolute;bottom:-8px;right:10px;color:oklch(0.55 0.12 295 / 0.08);
}
.id-card-v3 .avatar .hex{
  position:absolute;top:12px;left:12px;font-family:var(--mono);font-size:9px;color:oklch(0.55 0.12 295 / 0.6);z-index:2;
}
.id-card-v3 .avatar .avatar-img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  /* desaturate + violet tint so the photo reads "cyberpunk dossier" not "LinkedIn headshot" */
  filter:grayscale(0.7) contrast(1.05) brightness(0.9);
  mix-blend-mode:luminosity;opacity:0.92;
}
.id-card-v3 .avatar::before{
  content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(180deg,transparent 55%,oklch(0.11 0.025 295 / 0.5));
  box-shadow:inset 0 0 60px oklch(0.74 0.24 295 / 0.35);
}
.id-card-v3 dl{display:grid;grid-template-columns:80px 1fr;gap:6px 14px;font-family:var(--mono);font-size:11.5px;}
.id-card-v3 dt{color:var(--fg-mute);letter-spacing:.14em;text-transform:uppercase;font-size:9.5px;align-self:center;}
.id-card-v3 dd{margin:0;color:var(--fg);}
.id-card-v3 .hl{color:var(--violet);text-shadow:0 0 8px oklch(0.74 0.24 295 / 0.4);}
.id-card-v3 .scanner{
  margin-top:20px;height:3px;background:linear-gradient(to right,transparent,var(--cyan),transparent);
  animation:scan 2.8s ease-in-out infinite;
}
@keyframes scan{0%,100%{transform:translateX(-100%);opacity:0;}20%{opacity:1;}80%{opacity:1;}100%{transform:translateX(100%);}}

/* ── ARCHITECTURE (skills) ── */
.arch-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;}
@media(max-width:900px){.arch-grid{grid-template-columns:1fr;gap:28px;}}

.skill-clusters{display:flex;flex-direction:column;gap:28px;}
.cluster{padding:20px 24px;border:1px solid var(--line-s);background:oklch(0.14 0.03 295 / 0.4);position:relative;transition:border-color .3s,box-shadow .3s;}
.cluster:hover{border-color:oklch(0.74 0.24 295 / 0.5);box-shadow:0 0 20px oklch(0.74 0.24 295 / 0.08);}
.cluster .c-head{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg-mute);margin-bottom:14px;display:flex;justify-content:space-between;}
.cluster .c-head .accent{color:var(--violet);text-shadow:0 0 8px var(--violet);}
.cluster .pills{display:flex;flex-wrap:wrap;gap:8px;}
.pill{
  padding:6px 14px;border:1px solid oklch(0.55 0.12 295 / 0.4);
  font-family:var(--mono);font-size:11.5px;color:var(--fg-dim);letter-spacing:.06em;
  transition:all .2s;cursor:default;
}
.pill:hover{border-color:var(--cyan);color:var(--cyan);text-shadow:0 0 8px var(--cyan);background:var(--cyan-d);}

/* topology */
.arch-topo{position:sticky;top:60px;}
.topo-v3{border:1px solid var(--line);background:oklch(0.11 0.025 295 / 0.6);padding:4px;position:relative;}
.topo-v3 .topo-label{position:absolute;top:12px;left:12px;font-family:var(--mono);font-size:9.5px;color:var(--fg-mute);letter-spacing:.18em;z-index:2;}

/* ── DEPLOYMENTS ── */
.dep-list{display:flex;flex-direction:column;gap:0;}
.dep-item{
  border-bottom:1px solid var(--line-s);padding:28px 0;cursor:pointer;
  display:grid;grid-template-columns:56px 1fr auto 100px 32px;gap:20px;align-items:center;
  transition:padding .25s,background .2s;position:relative;overflow:hidden;
}
.dep-item::before{content:"";position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(to right,oklch(0.74 0.24 295 / 0.12),transparent);transition:width .3s;}
.dep-item:hover{padding-left:18px;background:oklch(0.17 0.035 295 / 0.4);}
.dep-item:hover::before{width:100%;}
.dep-item .d-no{font-family:var(--mono);font-size:10.5px;color:var(--fg-mute);letter-spacing:.14em;}
.dep-item .d-title{font-family:var(--grotesk);font-size:clamp(22px,3vw,38px);font-weight:600;letter-spacing:-.02em;color:var(--fg);line-height:1;}
.dep-item .d-tag{font-family:var(--mono);font-size:10px;color:var(--violet);letter-spacing:.2em;text-transform:uppercase;text-shadow:0 0 8px oklch(0.74 0.24 295 / 0.5);margin-top:6px;}
.dep-item .d-stack{font-family:var(--mono);font-size:11px;color:var(--fg-mute);letter-spacing:.06em;}
.dep-item .d-status{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.14em;}
.dep-item .d-status .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dep-item .d-status .dot.ok{background:var(--ok);box-shadow:0 0 8px var(--ok);}
.dep-item .d-status .dot.staging{background:var(--warn);box-shadow:0 0 8px var(--warn);}
.dep-item .d-arr{font-family:var(--grotesk);font-size:20px;color:var(--fg-mute);transition:color .2s,transform .2s;text-align:right;}
.dep-item:hover .d-arr{color:var(--violet);transform:translateX(4px);}

.dep-expand{grid-column:1/-1;max-height:0;overflow:hidden;transition:max-height .4s ease;}
.dep-item.open .dep-expand{max-height:700px;}
@media(max-width:900px){.dep-item.open .dep-expand{max-height:1600px;}}
.dep-expand-inner{display:grid;grid-template-columns:1.4fr 1fr;gap:28px;padding:20px 0 4px;border-top:1px dashed var(--line-s);}
@media(max-width:900px){.dep-expand-inner{grid-template-columns:1fr;}}
.dep-body p{font-family:var(--grotesk);font-size:14.5px;color:var(--fg-dim);line-height:1.65;margin:0 0 14px;}
.dep-meta{display:grid;grid-template-columns:100px 1fr;gap:4px 14px;font-family:var(--mono);font-size:11px;}
.dep-meta dt{color:var(--fg-mute);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;align-self:center;}
.dep-meta dd{margin:0;color:var(--cyan);}
.dep-actions{margin-top:16px;display:flex;flex-wrap:wrap;gap:10px;}
.dep-note{
  margin:14px 0 0;font-family:var(--mono);font-size:11px;line-height:1.55;
  color:var(--fg-mute);font-style:italic;letter-spacing:.02em;
  padding:10px 14px;border-left:2px solid var(--warn);background:oklch(0.80 0.18 70 / 0.05);
}
.dep-note .dep-note-label{color:var(--warn);font-style:normal;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:9.5px;margin-right:6px;}

.dep-mock{border:1px solid var(--line-s);background:oklch(0.11 0.025 295 / 0.7);position:relative;padding:20px;overflow:hidden;}
.dep-mock svg{width:100%;display:block;}
.dep-mock .mock-label{font-family:var(--mono);font-size:9px;color:var(--fg-mute);letter-spacing:.18em;margin-bottom:10px;}
/* Project screenshot — desaturated and tinted to fit the neon dossier aesthetic */
.dep-shot{position:relative;width:100%;aspect-ratio:16/10;overflow:hidden;border:1px solid var(--line-s);}
.dep-shot img{width:100%;height:100%;object-fit:cover;display:block;
  filter:saturate(0.65) contrast(1.05) brightness(0.92);
  transition:filter .35s ease,transform .35s ease;}
.dep-shot::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,transparent 60%,oklch(0.11 0.025 295 / 0.55)),
             radial-gradient(ellipse at 50% 0%,oklch(0.74 0.24 295 / 0.18),transparent 60%);
  mix-blend-mode:overlay;}
.dep-shot-scan{position:absolute;left:0;right:0;top:0;height:2px;
  background:linear-gradient(to right,transparent,var(--cyan),transparent);
  box-shadow:0 0 12px var(--cyan);animation:scan 3.4s ease-in-out infinite;}
.dep-item:hover .dep-shot img{filter:saturate(0.85) contrast(1.05) brightness(0.98);transform:scale(1.02);}

/* ── TIMELINE ── */
.tl-v3{position:relative;padding-left:28px;}
.tl-v3::before{content:"";position:absolute;left:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,var(--violet),var(--cyan),transparent);}
.tl-entry{padding:0 0 48px 40px;position:relative;}
.tl-entry::before{
  content:"";position:absolute;left:-7px;top:6px;width:14px;height:14px;
  border:1px solid var(--violet);background:var(--void);box-shadow:0 0 14px var(--violet);
  transform:rotate(45deg);
}
.tl-entry.now::before{background:var(--violet);}
.tl-entry .t-year{font-family:var(--mono);font-size:10px;color:var(--violet);letter-spacing:.2em;text-shadow:0 0 8px var(--violet);margin-bottom:10px;}
.tl-entry .t-title{font-family:var(--grotesk);font-weight:600;font-size:clamp(22px,2.8vw,36px);letter-spacing:-.02em;margin-bottom:8px;}
.tl-entry .t-role{font-family:var(--mono);font-size:10.5px;color:var(--cyan);letter-spacing:.16em;text-transform:uppercase;text-shadow:0 0 8px var(--cyan);margin-bottom:10px;}
.tl-entry .t-desc{font-family:var(--grotesk);font-size:14px;color:var(--fg-dim);line-height:1.6;max-width:560px;}

<script>
// ── Rain animation ──
(function() {
  const canvas = document.getElementById("rain");
  const ctx = canvas.getContext("2d");
  let drops = [];
  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);
  function mkDrop() {
    return {
      x: Math.random() * W,
      y: Math.random() * H - H,
      len: 14 + Math.random() * 24,
      speed: 8 + Math.random() * 16,
      opacity: 0.1 + Math.random() * 0.35,
      hue: Math.random() > 0.7 ? 210 : 295,
    };
  }
  for (let i = 0; i < 180; i++) drops.push(mkDrop());
  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (let d of drops) {
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - d.len * 0.12, d.y + d.len);
      const col = d.hue === 210
        ? `oklch(0.84 0.17 210 / ${d.opacity})`
        : `oklch(0.74 0.24 295 / ${d.opacity})`;
      ctx.strokeStyle = col;
      ctx.lineWidth = 0.8;
      ctx.stroke();
      d.y += d.speed;
      if (d.y > H + 40) { Object.assign(d, mkDrop(), { y: -40 }); }
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "violet",
  "rain": true,
  "intensity": "heavy"
}/*EDITMODE-END*/;

const ACCENTS = {
  violet:  { v: "oklch(0.74 0.24 295)", c: "oklch(0.84 0.17 210)" },
  magenta: { v: "oklch(0.72 0.26 330)", c: "oklch(0.84 0.17 210)" },
  blue:    { v: "oklch(0.65 0.22 255)", c: "oklch(0.84 0.17 170)" },
  gold:    { v: "oklch(0.82 0.18  72)", c: "oklch(0.84 0.17 210)" },
};

// scramble text
const SC = "アイウエオカキクケコ█▓01/\\|<>#$";
function Scramble({ text, dur = 500, trigger = 0 }) {
  const [out, setOut] = useState(text);
  useEffect(() => {
    let raf, start;
    const step = t => {
      if (!start) start = t;
      const p = Math.min((t - start) / dur, 1);
      const rev = Math.floor(p * text.length);
      let s = "";
      for (let i = 0; i < text.length; i++) {
        if (i < rev || text[i] === " ") s += text[i];
        else s += SC[Math.floor(Math.random() * SC.length)];
      }
      setOut(s);
      if (p < 1) raf = requestAnimationFrame(step);
      else setOut(text);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [text, trigger, dur]);
  return <span>{out}</span>;
}

function Clock() {
  const [t, setT] = useState(new Date());
  useEffect(() => { const id = setInterval(() => setT(new Date()), 1000); return () => clearInterval(id); }, []);
  const p = n => String(n).padStart(2, "0");
  // Beirut is UTC+3 (no DST since 2023)
  const bey = new Date(t.getTime() + 3 * 3600 * 1000);
  return <span>{p(bey.getUTCHours())}:{p(bey.getUTCMinutes())}:{p(bey.getUTCSeconds())} BEY+3</span>;
}

function CountUp({ to, dur = 1600 }) {
  const [v, setV] = useState(0);
  useEffect(() => {
    let raf, s;
    const step = t => {
      if (!s) s = t;
      const p = Math.min((t - s) / dur, 1);
      const e = 1 - Math.pow(1 - p, 3);
      setV(Math.round(to * e * 100) / 100);
      if (p < 1) raf = requestAnimationFrame(step);
      else setV(to);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [to, dur]);
  return v;
}
window.__SC = Scramble;
window.__Clock = Clock;
window.__CountUp = CountUp;
</script>

<script type="text/babel" data-presets="env,react">
// ── TWEAKS + APP ──
function Tweaks({ open, onClose, state, setState }) {
  const set = (k, v) => setState(s => ({...s, [k]: v}));
  useEffect(() => {
    const a = ACCENTS[state.accent] || ACCENTS.violet;
    document.documentElement.style.setProperty("--violet", a.v);
    document.documentElement.style.setProperty("--cyan", a.c);
    const rain = document.getElementById("rain");
    if (rain) rain.style.opacity = state.rain
      ? (state.intensity === "heavy" ? "0.45" : state.intensity === "light" ? "0.12" : "0.25")
      : "0";
  }, [state]);

  return (
    <div className={"tweaks-v3" + (open?" open":"")}>
      <h5>CONFIG <span className="close" onClick={onClose}>×</span></h5>
      <div className="row">
        <span>accent</span>
        <div className="swatch">
          {Object.keys(ACCENTS).map(k => (
            <span key={k} className={"sw"+(state.accent===k?" active":"")}
              style={{background: ACCENTS[k].v}}
              onClick={() => set("accent", k)}/>
          ))}
        </div>
      </div>
      <div className="row">
        <span>rain</span>
        <input type="checkbox" checked={state.rain} onChange={e=>set("rain",e.target.checked)}/>
      </div>
      <div className="row">
        <span>intensity</span>
        <select value={state.intensity} onChange={e=>set("intensity",e.target.value)} style={{fontFamily:"var(--mono)",fontSize:11,background:"var(--bg)",color:"var(--fg)",border:"1px solid var(--line)"}}>
          <option value="light">light</option>
          <option value="medium">medium</option>
          <option value="heavy">heavy</option>
        </select>
      </div>
    </div>
  );
}

function App() {
  const [tweakOpen, setTweakOpen] = useState(false);
  const [state, setState] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    const handler = e => {
      if (e.data?.type === "__activate_edit_mode") setTweakOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweakOpen(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  useEffect(() => {
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: state }, "*");
  }, [state]);

  return (
    <>
      <window.TopBar onTweaks={() => setTweakOpen(!tweakOpen)}/>
      <div className="page">
        <window.Hero/>
        <window.Identity/>
        <window.Architecture/>
        <window.Deployments/>
        <window.Chronicle/>
        <window.Signal/>
        <footer className="foot-v3">
          <div>◆ KJ.SYS · © 2026 · KHALIL AL JAMIL · ALL SECTORS OPERATIONAL</div>
          <div className="jp">技術 · 構造 · 展開</div>
          <div>NEON CITY DISTRICT · v26.05.08</div>
        </footer>
      </div>
      <Tweaks open={tweakOpen} onClose={() => setTweakOpen(false)} state={state} setState={setState}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
